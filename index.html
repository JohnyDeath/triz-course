<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F4E79">
<title>ТРИЗ-курс · 9 недель</title>
<style>
  :root{
    --bg:#fafbfc; --panel:#ffffff; --fg:#1a1d22; --muted:#6b7280;
    --accent:#1F4E79; --accent2:#2E75B6; --done:#0e8a4d; --done-soft:#d6f1e1;
    --border:#e6e8ec; --hover:#f1f4f8; --shadow:0 1px 3px rgba(20,30,50,.06);
    --radius:10px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1116; --panel:#161a21; --fg:#e7eaf0; --muted:#8a93a3;
      --accent:#4a9eff; --accent2:#69b1ff; --done:#3acf7c; --done-soft:#0e2e1d;
      --border:#262c36; --hover:#1d232c; --shadow:0 1px 3px rgba(0,0,0,.3);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.55;}
  body{display:flex; min-height:100vh; min-height:100dvh}
  button,input,textarea{font:inherit;color:inherit}
  a{color:var(--accent2)}
  textarea{font-family:inherit}

  /* ===== Sidebar ===== */
  #sidebar{
    width:300px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; height:100vh; height:100dvh; position:sticky; top:0;
  }
  #sidebar header{padding:20px 18px 14px; border-bottom:1px solid var(--border)}
  #sidebar header .title{font-weight:700; font-size:17px; line-height:1.25}
  #sidebar header .subtitle{font-size:12px; color:var(--muted); margin-top:4px}
  .progress{padding:14px 18px; border-bottom:1px solid var(--border)}
  .progress-bar{height:6px; background:var(--hover); border-radius:3px; overflow:hidden}
  .progress-fill{height:100%; background:var(--accent); width:0%; transition:width .3s}
  .progress-text{font-size:12px; color:var(--muted); margin-top:6px; display:flex; justify-content:space-between}
  .progress-text .pct{color:var(--accent); font-weight:600}
  .nav{flex:1; overflow-y:auto; padding:6px 0}
  .week{padding:0}
  .week-h{padding:10px 18px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600;
    display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none}
  .week-h .chev{transition:transform .2s; font-size:10px; opacity:.6}
  .week.collapsed .chev{transform:rotate(-90deg)}
  .week.collapsed .days{display:none}
  .week-h .meta{font-size:10px; color:var(--muted); font-weight:500; letter-spacing:0; text-transform:none}
  .days{padding:2px 0 8px}
  .day{padding:8px 18px 8px 36px; cursor:pointer; font-size:14px; display:flex; gap:8px; align-items:flex-start; position:relative}
  .day:hover{background:var(--hover)}
  .day.active{background:var(--hover); border-left:3px solid var(--accent); padding-left:33px}
  .day .num{flex-shrink:0; width:22px; color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px}
  .day .ttl{flex:1; line-height:1.35}
  .day.done .num{color:var(--done)}
  .day.done .num::before{content:"✓ "}
  .day.done .ttl{color:var(--muted)}
  .actions{padding:12px 18px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px}
  .actions button{padding:9px 12px; border:1px solid var(--border); background:transparent; color:var(--fg); border-radius:8px; cursor:pointer; text-align:left; font-size:13px}
  .actions button:hover{background:var(--hover)}
  .actions button.danger:hover{background:#fde8e8; color:#9d1f1f}
  @media (prefers-color-scheme: dark){.actions button.danger:hover{background:#3a1313; color:#ffb3b3}}

  /* ===== Main ===== */
  main{flex:1; min-width:0; display:flex; flex-direction:column}
  .topbar{display:none; align-items:center; gap:10px; padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10}
  .menu-btn{width:38px; height:38px; border:1px solid var(--border); background:var(--panel); border-radius:8px; cursor:pointer; font-size:18px}
  .topbar .title{font-weight:600; font-size:14px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .topbar .pct{font-size:13px; color:var(--accent); font-weight:600; flex-shrink:0}

  article{flex:1; padding:32px 40px 120px; max-width:880px; width:100%; margin:0 auto}
  .crumbs{font-size:13px; color:var(--muted); margin-bottom:6px}
  .crumbs .week-name{color:var(--accent2)}
  h1.day-title{font-size:28px; line-height:1.25; margin:0 0 8px; font-weight:700}
  .goal{padding:14px 16px; background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--accent);
    border-radius:var(--radius); margin:18px 0 28px; font-size:15px}
  .goal b{color:var(--accent)}

  section.block{margin:24px 0}
  section.block h2{font-size:18px; margin:0 0 10px; color:var(--accent); display:flex; align-items:center; gap:8px}
  section.block h2 .ico{font-size:18px}
  section.block .body{font-size:15px}
  ul.materials{margin:6px 0 0; padding:0; list-style:none}
  ul.materials li{padding:8px 0 8px 22px; position:relative; border-bottom:1px dashed var(--border)}
  ul.materials li:last-child{border-bottom:none}
  ul.materials li::before{content:"›"; position:absolute; left:6px; top:8px; color:var(--accent2); font-weight:700}
  .cheatsheet{padding:14px 16px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); white-space:pre-wrap}
  .practice, .journal{padding:12px 14px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius)}

  .notes-block{margin:24px 0 0}
  .notes-block h2{font-size:18px; margin:0 0 10px; color:var(--accent)}
  .notes-block .hint{font-size:12px; color:var(--muted); margin-bottom:8px}
  textarea.notes{width:100%; min-height:160px; padding:14px; border:1px solid var(--border); border-radius:var(--radius);
    background:var(--panel); resize:vertical; font-size:15px; line-height:1.55}
  textarea.notes:focus{outline:2px solid var(--accent); outline-offset:-1px; border-color:var(--accent)}
  .saved-status{font-size:12px; color:var(--muted); margin-top:6px; min-height:16px}

  /* Day actions: footer-style on bottom */
  .day-actions{display:flex; gap:8px; padding:14px 40px; background:var(--panel); border-top:1px solid var(--border);
    position:sticky; bottom:0; z-index:5; align-items:center; flex-wrap:wrap}
  .day-actions .spacer{flex:1}
  .day-actions button{padding:10px 14px; border:1px solid var(--border); background:transparent; color:var(--fg); border-radius:8px; cursor:pointer; font-size:14px; font-weight:500}
  .day-actions button:hover{background:var(--hover)}
  .day-actions button:disabled{opacity:.4; cursor:not-allowed}
  .day-actions button.primary{background:var(--accent); color:#fff; border-color:var(--accent); padding:10px 18px}
  .day-actions button.primary:hover{background:var(--accent2); border-color:var(--accent2)}
  .day-actions button.done{background:var(--done-soft); color:var(--done); border-color:var(--done-soft)}
  @media (prefers-color-scheme: dark){.day-actions button.done{background:var(--done-soft); color:#7ee0a3; border-color:#1a3a26}}

  /* Mobile */
  #scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50}
  @media (max-width: 900px){
    body{flex-direction:column}
    #sidebar{position:fixed; top:0; left:0; height:100%; height:100dvh; transform:translateX(-100%); transition:transform .25s; z-index:60; width:min(85%, 320px); box-shadow:0 0 18px rgba(0,0,0,.2)}
    body.menu-open #sidebar{transform:translateX(0)}
    body.menu-open #scrim{display:block}
    main{width:100%}
    .topbar{display:flex}
    article{padding:18px 16px 100px}
    .day-actions{padding:10px 12px}
    h1.day-title{font-size:22px}
    .day-actions button{padding:9px 12px; font-size:13px}
    .day-actions button.primary{padding:9px 14px}
    .day-actions button .label-long{display:none}
  }
  @media (min-width: 901px){
    .day-actions button .label-short{display:none}
  }

  /* Final celebration */
  .finale{text-align:center; padding:60px 20px}
  .finale h1{color:var(--accent); margin-bottom:8px}
  .finale p{color:var(--muted)}
</style>
</head>
<body>
  <aside id="sidebar">
    <header>
      <div class="title">ТРИЗ для архитектора</div>
      <div class="subtitle">9 недель × 7 дней · ~30–40 мин/день</div>
    </header>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-text">
        <span id="progText">0 / 63 дней</span>
        <span class="pct" id="progPct">0%</span>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="actions">
      <button onclick="goCurrent()">📍 К текущему дню</button>
      <button onclick="exportNotes()">⬇ Экспорт конспектов (.md)</button>
      <button class="danger" onclick="resetProgress()">⟲ Сбросить прогресс</button>
    </div>
  </aside>

  <div id="scrim" onclick="closeMenu()"></div>

  <main>
    <div class="topbar">
      <button class="menu-btn" onclick="openMenu()" aria-label="Меню">☰</button>
      <div class="title" id="topTitle">ТРИЗ-курс</div>
      <div class="pct" id="topPct">0%</div>
    </div>
    <article id="content"></article>
    <div class="day-actions" id="dayActions"></div>
  </main>

<script>
const COURSE = [{"n":1,"title":"Философия и фундамент ТРИЗ","goal":"Понять идеологию метода (ТРИЗ ≠ мозговой штурм), освоить ИКР, уровни задач, ресурсы и ключевой словарь. Завести рабочий журнал.","bigCase":"Описать одну вашу текущую задачу (например, «отчёт о финансовых результатах считается 40 минут») языком ТРИЗ: что есть, что мешает, какой ИКР.","days":[{"n":1,"title":"Что такое ТРИЗ. История и место среди других методов","goal":"Сформировать «правильное» представление о ТРИЗ — это не «творческий тренинг», а инструмент с конкретной онтологией: задачи бывают типовыми, и для каждого типа есть типовое решение.","materials":["Wikipedia (RU): ru.wikipedia.org/wiki/ТРИЗ — раздел «История» и «Основные положения» (~10 мин).","Книга: Г.С. Альтшуллер «Найти идею. Введение в ТРИЗ» — предисловие и глава 1 (~15 мин).","YouTube: запрос «ТРИЗ введение Кудрявцев» или «ТРИЗ Альтшуллер лекция» — выбрать одну вводную лекцию на 15–20 мин."],"cheatsheet":"Г.С. Альтшуллер создавал ТРИЗ с 1946 по 1985 г., анализируя десятки тысяч патентов. Главный вывод: «творчество» можно алгоритмизировать. Ядро метода — выявление и разрешение противоречий, использование ресурсов и опора на законы развития систем (ЗРТС). Отличие от мозгового штурма: ТРИЗ ищет НЕ много идей, а одно сильное решение через анализ задачи.","practice":"Записать в журнале своими словами 3 различия ТРИЗ от мозгового штурма и 1 цитату/тезис, который вас зацепил.","journal":"Заметка «Что такое ТРИЗ»: 3 различия + 1 тезис."},{"n":2,"title":"Идеальный конечный результат (ИКР)","goal":"Освоить ключевую формулу ТРИЗ: «функция выполняется сама собой, без подсистемы, без затрат и без вреда».","materials":["Книга: Альтшуллер «Найти идею» — глава об ИКР (или соответствующий раздел в «Творчество как точная наука»).","Сайт: altshuller.ru — раздел «Основные понятия ТРИЗ» (поиск «ИКР»).","YouTube: «идеальный конечный результат ТРИЗ» — короткий разбор (~10 мин)."],"cheatsheet":"ИКР — это формулировка решения «в идеале». Шаблон: «Объект X САМ выполняет функцию Y, не требуя ресурсов и не создавая побочных эффектов». Пример для учётной системы: «отчёт о финансовых результатах формируется сам, мгновенно, без дополнительных вычислений и без участия пользователя». ИКР почти никогда не достижим буквально — но он задаёт правильное направление поиска и избавляет от компромиссов.","practice":"Для одной рабочей задачи (например, «закрытие месяца») написать 3 формулировки ИКР: на уровне модуля, на уровне системы и на уровне процесса/бизнеса.","journal":"Раздел «Задачи» — 3 формулировки ИКР по шаблону «X САМ делает Y без Z»."},{"n":3,"title":"5 уровней изобретательских задач","goal":"Понять, на каком уровне находятся ваши обычные архитектурные задачи (по статистике 80% — это 1–2 уровень) и где есть потенциал для перехода на 3-й.","materials":["Книга: Альтшуллер «Творчество как точная наука» — глава «Уровни изобретений».","Статья: поиск «уровни изобретательских задач Альтшуллер» на metodolog.ru или triz-summit.ru."],"cheatsheet":"5 уровней: (1) применение готового решения в рамках одной системы; (2) изменение прототипа известной системы; (3) существенное улучшение в рамках отрасли (новые принципы, но известные); (4) новое применение из другой отрасли (перенос); (5) создание принципиально нового. ~70% «изобретений» — уровень 1, ~20% — уровень 2. ТРИЗ нужен в основном на уровнях 3–4 — там, где интуиция и опыт уже не работают.","practice":"Выписать 5 своих текущих задач и классифицировать по уровню. Отметить, где можно осознанно поднять уровень с 2 на 3 (например, перенести идею из другой отрасли).","journal":"Таблица: задача → уровень → потенциал перехода + краткое обоснование."},{"n":4,"title":"Ресурсы — что это в ТРИЗ","goal":"Научиться видеть, что у системы уже есть всё необходимое для решения — нужно только заметить ресурсы, которые сейчас не используются.","materials":["Книга: Альтшуллер «Найти идею» — глава «Анализ ресурсов».","YouTube: «ТРИЗ ресурсы» или «вещественно-полевые ресурсы».","Сайт: triz-summit.ru — раздел статей про ресурсы."],"cheatsheet":"5 видов ресурсов: вещественные (что есть как объекты), энергетические (какие силы/токи задействованы), пространственные (где), временные (когда), информационные (что известно/доступно). В ИТ это: данные, индексы, кэш, метаданные, лог-файлы, время простоя, существующие очереди, реплики, исторические данные, паттерны нагрузки. Главный приём: «не добавлять новое, а использовать то, что и так есть».","practice":"Составить список 10 ресурсов в текущем проекте, которые сейчас не используются (или используются не полностью).","journal":"Список «10 неиспользованных ресурсов системы» с короткими комментариями."},{"n":5,"title":"Глоссарий ТРИЗ: система, надсистема, ОЗ, ОВ","goal":"Закрепить ключевые термины — без них дальнейшие шаги будут «плавать».","materials":["Шпаргалка ниже + любая статья «глоссарий ТРИЗ» на altshuller.ru или triz-summit.ru."],"cheatsheet":"Система — то, что мы рассматриваем (например, модуль расчёта налогов). Надсистема — куда система входит (ERP, бизнес-процесс компании, отрасль). Подсистема — из чего состоит (таблицы, функции, API). Главная функция — зачем система существует (рассчитать налог корректно и в срок). Оперативная зона (ОЗ) — где именно происходит конфликт (конкретная процедура, конкретный модуль). Оперативное время (ОВ) — когда происходит конфликт (например, момент закрытия месяца). Без чёткого ОЗ и ОВ нельзя сформулировать сильное противоречие.","practice":"Заполнить мини-карточку для одной своей задачи: система / надсистема / подсистема / главная функция / ОЗ / ОВ.","journal":"Карточка задачи с заполненными 6 полями."},{"n":6,"title":"Чтение Альтшуллера","goal":"Услышать «оригинальный голос» автора, понять стиль и логику ТРИЗ. Это сильно меняет понимание метода.","materials":["Альтшуллер Г.С. «Найти идею. Введение в ТРИЗ» — главы 1–2 (~30–40 страниц).","Альтернатива: «Творчество как точная наука» — главы 1–2."],"cheatsheet":"В первых главах Альтшуллер: критикует метод проб и ошибок, показывает, что у изобретательских задач есть структура, и вводит идею «технического противоречия» как ядра задачи. Главный поворот мысли: «не искать решения, а искать формулировку противоречия — решение появится почти само».","practice":"Прочитать главы и законспектировать 5 ключевых тезисов своими словами + 1–2 пункта, с которыми вы не согласны или хотите оспорить.","journal":"Конспект «5 тезисов + моя реакция» в журнале."},{"n":7,"title":"Журнал ТРИЗ-задач — настройка","goal":"Создать единое место, куда будут складываться все артефакты курса. Без журнала курс рассыпется.","materials":["Любой удобный инструмент: Notion, Obsidian, OneNote, Excel, Google Docs."],"cheatsheet":"Структура журнала: (1) Задачи — список с описанием, ИКР, противоречием, статусом; (2) Глоссарий ТРИЗ — ваши формулировки терминов; (3) Приёмы 1–40 — заполняется в неделях 3–4 с вашими IT-примерами; (4) Кейсы — разобранные истории; (5) Прогнозы по ЗРТС — заполняется в неделе 5; (6) Финальный проект — заполняется в неделе 9. Шаблон карточки задачи: название → описание → ОЗ/ОВ → ИКР → ТП → ФП → выбранные приёмы → решение → результат.","practice":"Завести журнал, создать 6 разделов, заполнить раздел «Задачи» — добавить 3 ваши задачи с черновыми ИКР (можно использовать формулировки с дня 2).","journal":"Ссылка на журнал + минимум 3 задачи в нём."}]},{"n":2,"title":"Противоречия — ядро ТРИЗ","goal":"Научиться различать и формулировать административное (АП), техническое (ТП) и физическое (ФП) противоречия. Видеть противоречия там, где раньше видели «компромиссы».","bigCase":"Найти и довести до ФП минимум 3 противоречия в текущем проекте: производительность vs точность, гибкость настройки vs скорость закрытия, и т.п.","days":[{"n":1,"title":"Административное противоречие (АП)","goal":"Освоить самую поверхностную формулировку — отправную точку любой работы по ТРИЗ.","materials":["Статья: «административное противоречие ТРИЗ» — поиск на metodolog.ru или triz-summit.ru.","Альтшуллер «Найти идею» — глава о противоречиях, начало."],"cheatsheet":"АП = «надо, но не получается». Это исходная формулировка задачи на уровне жалобы или требования. Пример: «надо ускорить закрытие периода, но не получается». На этом уровне решения почти не видно — нужно копать глубже до ТП и ФП. АП полезно, чтобы зафиксировать стартовую точку и не уйти от исходной потребности.","practice":"Записать 3 АП из своей работы по шаблону «надо <что>, но <что мешает>».","journal":"Раздел «Противоречия» — 3 АП."},{"n":2,"title":"Техническое противоречие (ТП)","goal":"Освоить главный шаблон «улучшение → ухудшение». Это шаг от жалобы к диагностике.","materials":["Статья: «техническое противоречие ТРИЗ» на altshuller.ru.","YouTube: запрос «техническое противоречие ТРИЗ» — короткий разбор (~10 мин)."],"cheatsheet":"ТП = «если делаем X, то улучшается параметр A, но ухудшается параметр B». Пример: «если разбиваем таблицу проводок на партиции по периоду — ускоряются отчёты, но усложняется миграция схемы». Каждое АП обычно даёт 2 «зеркальных» ТП: прямое (что улучшится при действии) и обратное (что ухудшится, если ничего не делать). Полезно сформулировать оба.","practice":"Для каждого АП из дня 1 написать 2 ТП — прямое и обратное. Итого 6 ТП.","journal":"Таблица АП → ТП-прямое / ТП-обратное."},{"n":3,"title":"Физическое противоречие (ФП)","goal":"Научиться углублять ТП до ФП — «один объект должен быть и А, и не-А».","materials":["Альтшуллер «Найти идею» — глава о физическом противоречии.","Статья: «физическое противоречие ТРИЗ» — metodolog.ru."],"cheatsheet":"ФП формулируется как требование к ОДНОМУ объекту в ОДНОЙ оперативной зоне в ОДНО оперативное время. Пример: «таблица проводок должна быть одна (для целостности учёта) и не одна (для скорости отчётов и масштабирования)». ФП — самая «неудобная» формулировка, но именно из неё рождаются сильные решения, потому что она отрезает все компромиссы и заставляет искать разделение.","practice":"Из 3 ТП выделить 1 главный и переформулировать в ФП.","journal":"Минимум 3 ФП в журнале."},{"n":4,"title":"Шаблоны и типичные ошибки в формулировках","goal":"Отшлифовать формулировки. Разница между «слабой» и «сильной» формулировкой = разница между «решения нет» и «решение очевидно».","materials":["Шпаргалка ниже.","Опционально: разборы на triz-summit.ru — раздел кейсов."],"cheatsheet":"3 типичные ошибки: (1) ТП без второй стороны — «надо ускорить» — это всё ещё АП, а не ТП; (2) ФП о разных объектах — это снова ТП, в ФП должен быть ОДИН объект; (3) ФП «в принципе», без указания ОЗ и ОВ — теряется конкретика, появляется простор для отговорок. Хороший ФП всегда привязан к месту и моменту: «именно в этой таблице, именно в момент закрытия периода».","practice":"Переписать 3 свои задачи в трёх формулировках сразу: АП → ТП → ФП. Сравнить, какие были ошибки.","journal":"Таблица «АП → ТП → ФП» × 3 задачи."},{"n":5,"title":"4 способа разрешения ФП","goal":"Освоить базовые способы разделения противоречивых требований — это уже почти готовое решение.","materials":["Статья: «разрешение физического противоречия» на altshuller.ru или metodolog.ru.","YouTube: «разрешение противоречий ТРИЗ» — короткий разбор."],"cheatsheet":"4 способа разделения: (1) во времени — объект и А, и не-А, но в разные моменты (например, write-heavy режим в течение дня и read-heavy во время отчётности); (2) в пространстве — в разных частях (горячее/холодное хранилище); (3) в структуре — в подсистеме / в надсистеме (логически одна таблица, физически — партиции; одна сущность для бизнеса, разные представления для подсистем); (4) в отношениях — для разных пользователей/контекстов (одно API, но разные разрешения).","practice":"Выбрать 1 ФП и набросать 4 идеи решения — по одному способу разделения.","journal":"1 ФП → 4 идеи решения, отмеченные по способам."},{"n":6,"title":"Разбор готовых кейсов","goal":"Увидеть, как практики применяют формулировки противоречий к реальным задачам.","materials":["YouTube: канал «Школа ТРИЗ» (А.В. Кудрявцев) или поиск «разбор кейса ТРИЗ» — выбрать 1–2 видео по 15–20 мин.","Сайт: triz-summit.ru — раздел публикаций и кейсов."],"cheatsheet":"Что искать в чужом разборе: (а) исходное АП; (б) выделенное ТП и параметры; (в) переход к ФП и оперативная зона; (г) выбранный способ разрешения; (д) использованный приём из 40. Если автор перескочил какой-то шаг — отметьте это, попробуйте достроить сами.","practice":"Из одного просмотренного разбора заполнить карточку: АП → ТП → ФП → способ разрешения → приём.","journal":"Раздел «Кейсы» — 1 чужой разобранный кейс."},{"n":7,"title":"Журнал противоречий — итог недели","goal":"Получить рабочий запас противоречий, с которым будете работать в следующих неделях.","materials":["Журнал + ваши задачи."],"cheatsheet":"Хороший журнал противоречий — это не «список жалоб», а инструмент. Каждая запись должна быть достаточной для возврата через 2 месяца: должна включать контекст, ОЗ, ОВ и черновую ИКР.","practice":"Довести минимум 5 противоречий из журнала до уровня ФП. Для каждого — указать, какой способ разделения кажется наиболее перспективным.","journal":"Раздел «Противоречия» — минимум 5 записей с полным циклом АП → ТП → ФП + гипотеза разделения."}]},{"n":3,"title":"40 приёмов разрешения противоречий — приёмы 1–20","goal":"Освоить первую половину классической таблицы приёмов и привязать каждый к ИТ-аналогу из своей практики.","bigCase":"Взять одну реальную архитектурную задачу (например, шардирование таблицы проводок) и сгенерировать 5 решений, применив приёмы 1–20.","days":[{"n":1,"title":"Приёмы 1–4","goal":"Освоить базовые «структурные» приёмы.","materials":["Список 40 приёмов — поиск «40 приёмов Альтшуллера» на altshuller.ru, metodolog.ru или triz-summit.ru.","Книга «Найти идею» — раздел про приёмы."],"cheatsheet":"(1) Дробление — разделить объект на независимые части; разборная конструкция; увеличить степень дробления. ИТ: микросервисы, шардирование, разделение монолита, чанкование. (2) Вынесение — отделить мешающую часть/свойство, или, наоборот, выделить нужную. ИТ: CQRS (отделение чтения от записи), вынос отчётности на реплику, отдельный сервис аутентификации. (3) Местное качество — однородную структуру заменить неоднородной; каждая часть — в наиболее благоприятных условиях. ИТ: разные индексы для разных запросов, hot/cold storage, разные политики обработки для разных типов данных. (4) Асимметрия — перейти от симметричной формы к асимметричной. ИТ: асимметричное API, master/replica, разные роли пользователей.","practice":"Для каждого приёма привести 1 свой пример из IT/ERP/учётных систем (можно из существующих систем — где этот приём УЖЕ применён).","journal":"Раздел «Приёмы» — 4 карточки с IT-примерами."},{"n":2,"title":"Приёмы 5–8","goal":"Освоить «комбинаторные» приёмы.","materials":["Список приёмов (см. день 1)."],"cheatsheet":"(5) Объединение — соединить однородные или смежные объекты; объединить во времени однородные операции. ИТ: батчирование, материализованные представления, агрегаты, денормализация, объединение запросов. (6) Универсальность — один объект выполняет несколько функций, отпадают другие. ИТ: API gateway, плагин-архитектура, конфигурируемый отчёт вместо 10 фиксированных. (7) «Матрёшка» — один объект внутри другого, тот внутри третьего. ИТ: вложенные транзакции, savepoints, k8s-pods → containers, вложенные структуры данных, многоуровневый кэш. (8) Антивес — компенсировать «вес» соединением с другими объектами; компенсировать взаимодействием со средой. ИТ: балансировщик нагрузки, кэш «гасит» пики БД, использование внешнего сервиса для сглаживания.","practice":"1 IT-пример к каждому приёму. Проверить на своём проекте: где можно применить?","journal":"Раздел «Приёмы» — ещё 4 карточки."},{"n":3,"title":"Приёмы 9–12","goal":"Освоить «упреждающие» приёмы — это особенно сильно работает в учётных системах.","materials":["Список приёмов."],"cheatsheet":"(9) Предварительное антидействие — заранее совершить обратное действие. ИТ: WAL (write-ahead log), подготовка отката до выполнения, предварительная блокировка ресурсов. (10) Предварительное действие — заранее выполнить требуемое (полностью или частично). ИТ: индексы, материализованные представления, прекомпиляция, прогрев кэша, eager loading. (11) «Заранее подложенная подушка» — компенсировать ненадёжность заранее подготовленными аварийными средствами. ИТ: бэкапы, репликация, failover, circuit breaker, retry с backoff, dead-letter queue. (12) Эквипотенциальность — изменить условия так, чтобы не приходилось «поднимать-опускать». ИТ: убрать дорогие переходы между уровнями (БД ↔ кэш), упростить контекст, держать данные «на одном уровне».","practice":"Найти, какие из этих 4 приёмов УЖЕ применены в вашей системе. Где их можно усилить?","journal":"Раздел «Приёмы» — 4 карточки + отметки «уже применено / можно усилить»."},{"n":4,"title":"Приёмы 13–16","goal":"Освоить «инверсивные» и «динамические» приёмы.","materials":["Список приёмов."],"cheatsheet":"(13) «Наоборот» — вместо диктуемого действия осуществить обратное; движущееся сделать неподвижным и наоборот. ИТ: pull → push (или наоборот), polling → webhooks, инверсия зависимостей, перенос вычислений с сервера на клиент. (14) Сфероидальность — перейти от прямолинейных частей к криволинейным; от линейного к циклическому. ИТ: ring buffer, циклическая ребалансировка, замена линейного поиска индексами. (15) Динамичность — параметры системы должны меняться так, чтобы быть оптимальными на каждом этапе. ИТ: адаптивные алгоритмы, динамическая перебалансировка, autoscaling, горячее изменение конфигурации, feature flags. (16) Частичное или избыточное действие — если трудно получить 100%, получить «чуть больше» или «чуть меньше». ИТ: приближённые алгоритмы (HyperLogLog, Bloom-фильтр), eventual consistency, чанкинг с overlap.","practice":"Записать 2 идеи по своему проекту, применяя любые 2 приёма из 13–16.","journal":"Раздел «Идеи» — 2 идеи с указанием приёма."},{"n":5,"title":"Приёмы 17–20","goal":"Освоить приёмы про «измерения» и «непрерывность».","materials":["Список приёмов."],"cheatsheet":"(17) Переход в другое измерение — решать в плоскости вместо линии, в объёме вместо плоскости. ИТ: дерево/граф вместо списка, многомерные индексы, OLAP-кубы вместо плоских таблиц, иерархические данные. (18) Использование колебаний (вибрация). ИТ: heartbeat, periodic health checks, polling, gossip-протоколы, периодическая ребалансировка. (19) Периодическое действие — перейти от непрерывного к периодическому; использовать паузы для других действий. ИТ: батчевые задания, cron, scheduled jobs, использование slack-времени для compaction, vacuum в Postgres. (20) Непрерывность полезного действия — все части должны работать с полной нагрузкой; устранить холостые ходы. ИТ: pipelining, параллельная обработка, использование idle CPU, прогревочные задачи.","practice":"Найти приём из 17–20 в вашем существующем коде/архитектуре.","journal":"Раздел «Приёмы» — 4 карточки + отмеченные места в коде."},{"n":6,"title":"Сборка собственного IT-словаря приёмов 1–20","goal":"Зафиксировать 20 приёмов в виде персональной таблицы — это ваш рабочий инструмент на годы.","materials":["Журнал."],"cheatsheet":"Формат таблицы: № приёма | Название | Краткая суть | IT-аналог из вашего домена | 1 пример из вашего проекта (или почему не применимо). Цель — не теория, а практическая шпаргалка, к которой будете возвращаться при каждой новой задаче.","practice":"Заполнить таблицу 20 приёмов своими IT-аналогами и хотя бы 10 примерами из своего проекта.","journal":"Раздел «Приёмы 1–20» — заполненная таблица."},{"n":7,"title":"Анализ существующих учётных систем","goal":"Увидеть, как приёмы уже использованы в крупных системах — это сильно расширяет интуицию.","materials":["Документация: 1С, SAP S/4HANA, Odoo, Oracle EBS — выбрать одну, к которой есть доступ.","Опционально: статьи на Хабре по архитектуре этих систем."],"cheatsheet":"Где искать приёмы в архитектуре ERP: партиционирование таблиц проводок (приём 1, 17, 19), реплика для отчётов (1, 2), агрегаты и периодические отчёты (5, 19), материализованные представления (10), очереди задач и отложенные операции (19, 20), кэширование справочников (10), журнал изменений / WAL (9, 11).","practice":"Выбрать одну подсистему (например, модуль закрытия периода или формирования отчётности) и найти в ней не менее 5 приёмов из 1–20.","journal":"Заметка на 1 страницу: «5 приёмов в модуле X»."}]},{"n":4,"title":"40 приёмов: 21–40 + матрица Альтшуллера","goal":"Закрыть оставшиеся приёмы и научиться пользоваться матрицей 39×39 для подбора приёмов под пары противоречивых параметров.","bigCase":"Взять одно ТП из недели 2, найти параметры в матрице, получить 4 рекомендованных приёма и написать 4 идеи решения.","days":[{"n":1,"title":"Приёмы 21–24","goal":"Освоить приёмы про темп, обратные связи и посредников.","materials":["Список 40 приёмов (altshuller.ru, metodolog.ru)."],"cheatsheet":"(21) «Проскок» — вести вредные/опасные этапы на большой скорости. ИТ: timeout на операцию, fast-fail, ограничение длительности транзакции, agile/итеративность вместо больших релизов. (22) Обратить вред в пользу — использовать вредный фактор для пользы. ИТ: использовать журнал ошибок для аналитики, использовать «шум» в данных как источник изоляции (rate limiting), bug bounty, chaos engineering как тренировка. (23) Обратная связь — ввести или изменить обратную связь. ИТ: метрики, мониторинг, контуры регуляции (autoscaling-PID), feedback-loops, A/B-тесты. (24) Посредник — промежуточный объект, переносящий действие. ИТ: шина сообщений, API gateway, service mesh, прокси, ETL-слой, anti-corruption layer.","practice":"1 IT-пример к каждому приёму. Особое внимание приёму 23 — где у вас слабая обратная связь?","journal":"Раздел «Приёмы» — 4 карточки + минимум 1 место для усиления обратной связи."},{"n":2,"title":"Приёмы 25–28","goal":"Освоить приёмы про самообслуживание, копии и смену парадигмы.","materials":["Список приёмов."],"cheatsheet":"(25) Самообслуживание — объект сам себя обслуживает. ИТ: self-healing, auto-recovery, autovacuum в Postgres, автоматическое создание индексов, self-tuning DB. (26) Копирование — вместо дорогого/сложного использовать упрощённую копию. ИТ: mock-сервисы, sandbox, sample-данные, цифровой двойник, тестовые маски. (27) Дешёвая недолговечность вместо дорогой долговечности — заменить дорогой объект набором дешёвых. ИТ: spot-инстансы, ephemeral environments, cattle vs pets, контейнеры вместо VM. (28) Замена механической схемы — перейти от механической к оптической, акустической, тепловой и т.д. (для ИТ: смена парадигмы). ИТ: реляционная → колоночная БД, синхронный → асинхронный, императивный → декларативный, RPC → события.","practice":"1 IT-пример к каждому приёму. Сформулировать: где вы могли бы заменить «дорогую долговечность» на «дешёвую недолговечность»?","journal":"Раздел «Приёмы» — 4 карточки."},{"n":3,"title":"Приёмы 29–32","goal":"Освоить «текучие» и «гибкие» приёмы, адаптировать к ИТ через метафору.","materials":["Список приёмов."],"cheatsheet":"(29) Пневмо- и гидроконструкции — текучие части вместо твёрдых. ИТ: streaming вместо batch, поток событий вместо статичной таблицы, immutable log как «текучий» источник истины (Kafka, event sourcing). (30) Гибкие оболочки и тонкие плёнки. ИТ: API-обёртки, адаптеры, тонкие фасады поверх legacy, anti-corruption layer. (31) Пористые материалы. ИТ: «дырявые» кэши (LRU с возможностью промахов), частичное логирование (sampling), tracing с sampling rate, частичная валидация. (32) Изменение окраски (или прозрачности). ИТ: цветовая индикация в UI/мониторинге, теги в логах, маркировка трафика (canary deployment), feature flags.","practice":"Адаптировать 2 приёма к своему проекту: какие «твёрдые» структуры можно сделать «текучими»?","journal":"Раздел «Идеи» — 2 идеи (например, «таблица X → event-stream»)."},{"n":4,"title":"Приёмы 33–36","goal":"Освоить приёмы про однородность, регенерацию, фазовые переходы.","materials":["Список приёмов."],"cheatsheet":"(33) Однородность — взаимодействующие объекты сделаны из одного материала. ИТ: единый формат данных (JSON / Protobuf), один язык в стеке, одна модель доступа, общая ОС, единый контракт API. (34) Отброс и регенерация частей — выполнившая своё часть отбрасывается; недостающее восполняется по ходу. ИТ: garbage collection, удаление временных файлов, генерация недостающих сущностей по запросу (lazy creation), TTL-данные. (35) Изменение физико-химических параметров. ИТ: смена параметров среды/конфигурации без переписывания логики (флаги, тюнинг GC, расширение лимитов, изменение isolation level). (36) Фазовые переходы. ИТ: переход между уровнями консистентности (read-uncommitted → committed), warm-up → hot, sleeping → active, graceful shutdown.","practice":"Найти 1 место в системе, где меняется «фаза» (warm/cold, sync/async). Описать, как это устроено.","journal":"Заметка о 1 фазовом переходе в системе."},{"n":5,"title":"Приёмы 37–40","goal":"Завершить таблицу приёмов и адаптировать «химические» приёмы к ИТ.","materials":["Список приёмов."],"cheatsheet":"(37) Тепловое расширение — использовать различия в характеристиках. ИТ: routing по нагрузке (least-loaded), разная политика для разных модулей в зависимости от их состояния. (38) Сильные окислители — намеренно интенсивная среда. ИТ: stress-testing, chaos engineering, load testing, fuzzing — «сжигаем» систему намеренно, чтобы найти слабости. (39) Инертная среда — заменить обычную на инертную; вакуум. ИТ: изоляция (sandbox, namespace), герметизация (контейнеризация), VPN, multi-tenancy с жёсткой изоляцией данных. (40) Композиционные материалы — гибридные подходы. ИТ: SQL + key-value в одной системе, монолит ядра + микросервисы вокруг, разные алгоритмы для разных подзадач, polyglot persistence.","practice":"Заполнить персональную таблицу приёмов 21–40 (по аналогии с днём 6 недели 3).","journal":"Раздел «Приёмы 21–40» — таблица."},{"n":6,"title":"Матрица Альтшуллера 39×39","goal":"Понять, как работает классический инструмент подбора приёмов.","materials":["Онлайн-матрица: поиск «матрица Альтшуллера онлайн» (есть на metodolog.ru, triz40.com и других).","39 параметров: вес, длина, время, надёжность, сложность, точность и т.д. — список есть в книге Альтшуллера и на сайтах."],"cheatsheet":"Как пользоваться: (1) для своего ТП определить параметр, который УЛУЧШАЕТСЯ; (2) определить параметр, который УХУДШАЕТСЯ; (3) найти ячейку на пересечении в матрице; (4) получить 1–4 рекомендованных приёма (по номерам). Сложность для ИТ: параметры классической матрицы — физические. Их нужно переводить: «вес» → «объём данных», «надёжность» → «надёжность системы», «время» → «время отклика», «сложность» → «сложность кода», «точность» → «точность результата».","practice":"Перевести 5 параметров из 39 классических в IT-эквиваленты для ваших задач.","journal":"Таблица «классический параметр → IT-параметр»."},{"n":7,"title":"Прогон 1 ТП через матрицу — сквозной кейс недели","goal":"Получить 4 идеи решения через матрицу и оценить, какие применимы.","materials":["Матрица Альтшуллера + ваш журнал ТП."],"cheatsheet":"Полная процедура: ТП → улучшающийся параметр → ухудшающийся параметр → ячейка матрицы → список приёмов → для каждого приёма «прогнать» через свою задачу → оценить применимость и стоимость внедрения.","practice":"Взять 1 ТП из недели 2, прогнать через матрицу, написать 4 идеи решения. Выбрать одну для пилота.","journal":"Раздел «Идеи» — 4 решения + 1 выбранная для пилота."}]},{"n":5,"title":"Законы развития технических систем (ЗРТС)","goal":"Освоить 8 классических законов развития систем и применить их к прогнозу эволюции вашей учётной системы.","bigCase":"Для своей системы (или модуля) написать прогноз на 3 года по ЗРТС: какие функции уйдут в надсистему, какие подсистемы изменятся, как повысится степень идеальности.","days":[{"n":1,"title":"Закон полноты частей системы","goal":"Понять, что любая работающая система состоит из 4 частей; «полусистема» неустойчива.","materials":["Альтшуллер «Творчество как точная наука» — глава о ЗРТС.","Сайт: triz-summit.ru — раздел «Законы развития»."],"cheatsheet":"4 части любой ТС: (1) двигатель — источник энергии; (2) трансмиссия — передача энергии; (3) рабочий орган — преобразование в полезное действие; (4) орган управления — обратная связь и регуляция. В ИТ: (1) источник данных / событий; (2) пайплайн / шина; (3) бизнес-логика / процессор; (4) мониторинг / конфигурация / контур обратной связи. Если чего-то нет или это «человек на ручке» — система ещё не полная и будет эволюционировать в сторону достройки.","practice":"Проанализировать 1 модуль учётной системы по 4 частям. Чего не хватает или что заменено человеком?","journal":"Карточка «Полнота частей: модуль X» с 4 пунктами."},{"n":2,"title":"Закон энергетической проводимости","goal":"Понять, что энергия (в ИТ — данные и управляющие сигналы) должна свободно проходить от источника к рабочему органу.","materials":["См. источники дня 1."],"cheatsheet":"Если на пути «энергии» есть препятствия (узкие места, ручные шаги, ETL-разрывы, рассинхронизация форматов) — система деградирует. Эволюция систем идёт в сторону устранения препятствий и появления «прямой проводимости».","practice":"Нарисовать карту потоков данных в одной подсистеме и отметить места «затруднённой проводимости» (переформатирование, ручные шаги, узкие места).","journal":"Карта потоков с отмеченными «узкими местами»."},{"n":3,"title":"Закон согласования ритмики","goal":"Найти, где у вас рассинхрон между подсистемами — типичный источник проблем в ERP.","materials":["См. источники дня 1."],"cheatsheet":"Рассинхрон = разные «частоты»: онлайн-операции на миллисекундах vs батчи на часах vs закрытие периода на сутки. Хорошие системы всё больше согласуют ритмику (стримы, eventual consistency, материализованные представления с автообновлением). В ERP типичный конфликт: операционные модули (онлайн) ↔ модуль отчётности (батч).","practice":"Найти 2 места рассинхрона в системе. Описать симптомы (где это «болит»).","journal":"Заметка «2 рассинхрона в системе»."},{"n":4,"title":"Закон повышения идеальности","goal":"Освоить главный закон ТРИЗ — формулу идеальности.","materials":["Альтшуллер «Найти идею» — глава об идеальности."],"cheatsheet":"Формула: И = (Σ полезных функций) / (Σ затрат + Σ вреда). Эволюция любой системы — это рост идеальности: либо больше пользы при тех же затратах, либо те же польза/вред при меньших затратах. Идеальная система — та, которой нет, а функция выполняется. Это совпадает с ИКР.","practice":"Оценить идеальность одного модуля «до» (как сейчас) и «после» предполагаемого улучшения. Записать, что улучшится в числителе, что в знаменателе.","journal":"Расчёт идеальности модуля до/после (можно качественный)."},{"n":5,"title":"Неравномерность развития + вытеснение человека","goal":"Освоить два закона, которые помогают находить «слабое звено» и проектировать автономность.","materials":["См. источники дня 1."],"cheatsheet":"Неравномерность: подсистемы развиваются с разной скоростью; одна часто становится «слабым звеном» и тормозит всю систему. Найдите её — там точка приложения усилий. Вытеснение человека: эволюция идёт от ручного управления → к контролю → к автономности. Если ваш «орган управления» — человек, рано или поздно его автоматизируют. Это направление эволюции, не угроза.","practice":"Найти «слабое звено» в архитектуре (компонент, который сильно отстаёт от остальных). Найти «ручные шаги», которые рано или поздно автоматизируются.","journal":"Заметка: 1 слабое звено + 3 ручных шага под автоматизацию."},{"n":6,"title":"Переход в надсистему + S-образное развитие","goal":"Понять, на какой стадии жизненного цикла ваша система и куда она пойдёт дальше.","materials":["См. источники дня 1; статья «S-кривая ТРИЗ» на metodolog.ru."],"cheatsheet":"Переход в надсистему: исчерпав потенциал внутри себя, система объединяется с другими (моно- → би- → поли-системы). В ИТ: интеграция с CRM, BI, налоговой, банками — всё это переходы в надсистему. S-кривая: рождение → рост → зрелость → стагнация. На стадии зрелости появляются альтернативы; если не перейти в надсистему — систему заменят.","practice":"Определить, на какой стадии S-кривой ваша система. Какие надсистемы уже частично интегрированы и какие можно интегрировать дальше?","journal":"Карточка «Стадия + надсистемы»: текущее положение + 2–3 направления интеграции."},{"n":7,"title":"Сводный 3-летний прогноз по ЗРТС — кейс недели","goal":"Собрать выводы недели в один документ — это ценный артефакт для разговора с командой/руководством.","materials":["Все ваши заметки за неделю."],"cheatsheet":"Структура прогноза: (1) текущее состояние системы; (2) полнота частей — что нужно достроить; (3) узкие места проводимости; (4) точки рассинхрона; (5) расчёт идеальности и куда её повышать; (6) слабое звено и ручные шаги; (7) стадия S-кривой; (8) направления перехода в надсистему; (9) 3 главных вектора развития на 3 года.","practice":"Собрать 1-страничный прогноз эволюции вашей системы (или модуля) на 3 года.","journal":"Раздел «Прогнозы» — 1-страничный документ."}]},{"n":6,"title":"Ресурсы и вепольный анализ (упрощённо)","goal":"Научиться видеть скрытые ресурсы и работать с упрощённой моделью «вещество–поле» (в ИТ — сущность–сущность–функция).","bigCase":"Провести анализ ресурсов одного узкого места и предложить 3 решения, использующих только уже существующие ресурсы (без новых компонентов).","days":[{"n":1,"title":"5 видов ресурсов — полный обзор","goal":"Систематизировать представление о ресурсах после первого знакомства в неделе 1.","materials":["Альтшуллер «Найти идею» — глава «Анализ ресурсов».","YouTube: «вещественно-полевые ресурсы ТРИЗ»."],"cheatsheet":"5 видов: вещественные (объекты — таблицы, файлы, очереди); энергетические (силы — нагрузка, сетевой трафик, CPU); пространственные (где — узлы кластера, регионы, секции таблицы); временные (когда — момент закрытия, ночное окно, slack-время); информационные (что известно — метаданные, статистика, история запросов). Делятся на: исходные (есть в системе) и производные (можно получить из исходных дешевле, чем добавлять новое).","practice":"Расширить список из дня 4 недели 1 до 5 категорий × 5 ресурсов = 25 ресурсов.","journal":"Расширенный список ресурсов 5×5."},{"n":2,"title":"Скрытые ресурсы — «бесплатные» и «вредные»","goal":"Научиться видеть ресурсы, которые сейчас простаивают или даже мешают.","materials":["Шпаргалка ниже + поиск «скрытые ресурсы ТРИЗ»."],"cheatsheet":"Бесплатные ресурсы — побочные продукты системы (логи, метрики, истории запросов). Вредные ресурсы — то, что мешает (шум в данных, ошибки, простой). Сильное решение часто использует именно вредный ресурс: «обращение вреда в пользу» (приём 22). Пример: трафик ошибок 4xx — это карта неудачных запросов, можно использовать для UX-аналитики; нагрузка в часы пик — используется для тренировки моделей нагрузки.","practice":"Составить список 5 «вредных» или «побочных» ресурсов в системе и предложить 1 способ использования каждого.","journal":"Список «5 вредных ресурсов → способы использования»."},{"n":3,"title":"Веполь: вещество + вещество + поле","goal":"Понять модель веполя и адаптировать к ИТ.","materials":["Альтшуллер — глава о вепольном анализе.","Статья: «вепольный анализ ТРИЗ» на altshuller.ru, metodolog.ru."],"cheatsheet":"Классический веполь: 2 вещества (В1, В2) и поле (F), которое связывает их и обеспечивает функцию. Если поля нет — функция не выполняется. Если поле «вредное» — функция работает не так, как надо. ИТ-аналог: 2 сущности (например, заказ и склад) + функция/связь (резервирование). Если связи нет — операция невозможна. Если связь «вредная» — например, гонка состояний — её надо нейтрализовать.","practice":"Построить веполь для 1 узкого места: какие 2 сущности, какая функция/связь, что не так?","journal":"Веполь для 1 узкого места + диагноз «чего не хватает»."},{"n":4,"title":"Достройка веполя и разрушение вредного","goal":"Освоить главные операции вепольного анализа.","materials":["См. источники дня 3."],"cheatsheet":"(1) Если веполя нет — достроить (добавить недостающее вещество или поле). ИТ: добавить связь (event), добавить промежуточный сервис, ввести индекс, ввести метрику. (2) Если веполь вредный — разрушить или заменить. ИТ: убрать прямую зависимость, добавить посредника (приём 24), ввести защитный слой. (3) Если поле слабое — усилить. ИТ: усилить связь, добавить gating, ввести retry/idempotency. (4) Если веполь полный, но не оптимален — заменить поле на «более управляемое». ИТ: синхронный → асинхронный, push → pull, etc.","practice":"К веполю из дня 3 применить одну из 4 операций.","journal":"Запись «было → стало» по 1 веполю."},{"n":5,"title":"Стандарты решения изобретательских задач — топ-10 для ИТ","goal":"Получить готовый набор «частных решений», к которым возвращаются практики ТРИЗ.","materials":["Книга: Альтшуллер — раздел о 76 стандартах (или сокращённые версии в современных книгах).","Сайт: triz-summit.ru — статьи про стандарты."],"cheatsheet":"Из 76 стандартов в ИТ-практике особенно полезны: достройка веполя; объединение веполей в цепочку; переход в надсистему; динамизация связей; согласование ритмики; устранение вредного веполя через введение модификатора; повышение управляемости поля. На уровне приёмов: 1 (дробление), 5 (объединение), 9 (предв. антидействие), 10 (предв. действие), 11 (подушка), 17 (другое измерение), 19 (периодичность), 23 (обратная связь), 24 (посредник), 25 (самообслуживание).","practice":"Из своих 5+ записей по противоречиям/веполям отметить, к каким из топ-10 они тяготеют.","journal":"Сводная таблица: задача → топ-10 стандарт."},{"n":6,"title":"Кейс — оптимизация отчёта через ресурсный анализ","goal":"Применить весь арсенал недели к одной осязаемой задаче.","materials":["Только ваш проект и журнал."],"cheatsheet":"Алгоритм: (1) выбрать узкое место — отчёт, который медленный/неточный/негибкий; (2) выписать все ресурсы (5×5); (3) построить веполь (что есть, что не так); (4) применить 1–2 операции достройки/разрушения; (5) сгенерировать 3 идеи, использующих ТОЛЬКО существующие ресурсы.","practice":"Полный прогон по 1 отчёту: ресурсы → веполь → 3 идеи решения.","journal":"Карточка «Кейс отчёта» с полной цепочкой."},{"n":7,"title":"Сравнение «до и после ТРИЗ»","goal":"Зафиксировать, что именно ТРИЗ дал по сравнению с обычным «подумать».","materials":["Журнал."],"cheatsheet":"Что искать: (а) идеи, которые НЕ возникли бы без формулировки противоречия; (б) ресурсы, которые НЕ заметили бы без анализа 5×5; (в) направления, которые подсказала матрица или ЗРТС, а не интуиция.","practice":"Написать заметку на ½ страницы: что нового вы увидели, благодаря ТРИЗ-анализу.","journal":"Заметка-рефлексия за 6 недель."}]},{"n":7,"title":"АРИЗ — алгоритм решения изобретательских задач","goal":"Освоить упрощённую версию АРИЗ-85В как пошаговую процедуру для сложных задач, где «приёмов» недостаточно.","bigCase":"Полный прогон укороченной версии АРИЗ (9 шагов) на одной из задач из журнала — это «выпускной» кейс перед финальным проектом.","days":[{"n":1,"title":"Что такое АРИЗ-85В. Зачем нужен полный алгоритм","goal":"Понять место АРИЗ в арсенале ТРИЗ — это не альтернатива приёмам, а инструмент для сложных задач.","materials":["Wikipedia: ru.wikipedia.org/wiki/АРИЗ.","Сайт: altshuller.ru — раздел «АРИЗ».","YouTube: «АРИЗ-85В введение» — обзорная лекция."],"cheatsheet":"АРИЗ-85В — последняя редакция Альтшуллера. Состоит из 9 частей (~40 шагов). Применяется, когда задача сложная и «обычным» путём (приёмы → матрица) не решается. Главная идея: довести задачу до предельной формулировки (ФП в ОЗ и ОВ), мобилизовать все ресурсы, после чего решение становится почти очевидным. Для практики архитектора достаточно укороченной версии — 9 ключевых шагов.","practice":"Скачать или нарисовать опорную карту АРИЗ (9 частей) для дальнейшего использования.","journal":"Опорная схема АРИЗ в журнале."},{"n":2,"title":"Часть 1: Анализ задачи","goal":"Выделить мини-задачу — то, что реально нужно решить, без «расширений и улучшений».","materials":["altshuller.ru / metodolog.ru — текст АРИЗ."],"cheatsheet":"Мини-задача = «всё остаётся как есть, но появляется требуемая функция / устраняется вредная». Макси-задача = «всё переделать». ТРИЗ почти всегда работает с мини-задачей: это даёт максимум ресурсов и минимум сопротивления изменениям.","practice":"Выбрать 1 задачу из журнала. Сформулировать её как мини-задачу.","journal":"Запись «Мини-задача» для выбранной задачи."},{"n":3,"title":"Часть 2: Модель задачи. Конфликтующая пара. ОЗ и ОВ","goal":"Перевести задачу из «бытовой» формулировки в формальную модель.","materials":["altshuller.ru — текст АРИЗ."],"cheatsheet":"Конфликтующая пара = два элемента, между которыми возникает противоречие (например, «таблица проводок» и «процесс отчётности»). ОЗ = область, где разворачивается конфликт (конкретная процедура, конкретный модуль). ОВ = момент времени (например, последний день месяца, 23:00–06:00). Чёткое выделение ОЗ и ОВ резко сужает пространство поиска.","practice":"Для своей задачи определить: конфликтующую пару, ОЗ, ОВ. Записать одной фразой.","journal":"Запись «модель задачи» с 3 параметрами."},{"n":4,"title":"Часть 3: ИКР и ФП","goal":"Сформулировать «недостижимый» ИКР и из него вывести ФП.","materials":["altshuller.ru — текст АРИЗ."],"cheatsheet":"ИКР-1: «Х-элемент в ОЗ во время ОВ обеспечивает функцию (например, мгновенный отчёт), не вызывая нежелательного эффекта (например, увеличения нагрузки)». Х-элемент — это то, что должно «сделаться само». ИКР-2: «никакого Х-элемента нет, а функция всё равно выполняется». ФП — формулировка от ИКР: «такой-то объект в ОЗ во время ОВ должен быть и А, и не-А».","practice":"Для своей задачи написать ИКР-1, ИКР-2 и ФП.","journal":"Запись «ИКР-1 / ИКР-2 / ФП»."},{"n":5,"title":"Часть 4: Мобилизация ресурсов (ВПР)","goal":"Найти все вещественно-полевые ресурсы (ВПР), которые есть в ОЗ и ОВ.","materials":["altshuller.ru — текст АРИЗ."],"cheatsheet":"ВПР делятся на: внутрисистемные (что внутри ОЗ — таблицы, индексы, кэши, ровно в этой подсистеме); внешнесистемные (соседи — другие модули, очереди); надсистемные (среда — ОС, кластер, сеть, время). Ищите особенно «бесплатные» ресурсы: побочные продукты, метаданные, кэш, время простоя ОВ.","practice":"Составить полный список ВПР для своей задачи (минимум 10 пунктов).","journal":"Запись «ВПР задачи Х»."},{"n":6,"title":"Части 5–9: применение приёмов, информационного фонда, проверка решения","goal":"Закрыть оставшиеся шаги АРИЗ.","materials":["altshuller.ru — текст АРИЗ."],"cheatsheet":"Часть 5: применение приёмов разрешения ФП (4 способа разделения) + 40 приёмов + матрица. Часть 6: применение информационного фонда — стандарты, эффекты (физические/химические/геометрические; для ИТ — алгоритмические). Часть 7: смена и переформулировка задачи, если решение не найдено. Часть 8: применение к надзадаче (как улучшение поможет старшей системе). Часть 9: анализ хода решения — что было сильным, что слабым (важно для роста).","practice":"По своей задаче пройти шаги 5–6: предложить 2–3 идеи решения; проверить, нет ли подходящих стандартов.","journal":"Запись «идея-кандидат» с обоснованием."},{"n":7,"title":"Полный прогон укороченного АРИЗ","goal":"Получить «АРИЗ-протокол» — формальный документ, который можно показать команде.","materials":["Журнал."],"cheatsheet":"Структура протокола: (0) исходная задача (АП); (1) мини-задача; (2) модель: КП, ОЗ, ОВ; (3) ИКР-1, ИКР-2, ФП; (4) ВПР; (5) применённый способ разделения; (6) использованные приёмы; (7) выбранное решение; (8) проверка по идеальности; (9) рефлексия — что было сложно.","practice":"Написать АРИЗ-протокол на 1–2 страницы для своей задачи.","journal":"Раздел «АРИЗ-протоколы» — 1 законченный протокол."}]},{"n":8,"title":"ТРИЗ в IT и системах учёта","goal":"Применить весь арсенал к четырём типовым кейсам систем учёта и выбрать тему финального проекта.","bigCase":"К концу недели — выбранная тема финального проекта (краткое ТЗ для себя на 1 страницу).","days":[{"n":1,"title":"Software TRIZ — особенности применения","goal":"Понять, чем ТРИЗ для софта отличается от классической: нет физики, есть данные и алгоритмы.","materials":["Статьи Darrell Mann и других на тему «Software TRIZ» (поиск на Google Scholar или triz-journal.com).","Поиск «Software TRIZ» / «ТРИЗ для программного обеспечения» на metodolog.ru."],"cheatsheet":"Ключевые отличия: (а) физические эффекты заменяются алгоритмическими/архитектурными паттернами; (б) ресурсы — это данные, метаданные, время простоя, кэш; (в) «вещества» — сущности и компоненты, «поля» — связи и протоколы; (г) законы развития работают так же, но «вытеснение человека» означает автоматизацию рутины разработчика. Главное правило: переводите классические приёмы и параметры в IT-эквиваленты ДО применения, а не после.","practice":"Выбрать 5 классических приёмов и записать чёткую IT-формулировку для каждого (на ½ страницы).","journal":"Заметка «5 приёмов в IT-формулировке»."},{"n":2,"title":"Антипаттерны учётных систем глазами ТРИЗ","goal":"Увидеть классические «болезни» ERP/учёта как нарушения законов и противоречия.","materials":["Любой обзор архитектурных антипаттернов (Хабр, статьи по DDD/EAA).","Ваш собственный опыт."],"cheatsheet":"Типичные антипаттерны и их ТРИЗ-диагноз: «один большой регистр» (нарушает закон полноты — нет органа управления, всё через ручной разбор); «всё в одной транзакции» (нарушает закон согласования ритмики); «отчёт перебирает ВСЁ заново» (нарушает приём 10 — предв. действие); «закрытие периода блокирует онлайн» (классическое ТП — целостность vs доступность); «двойной ввод данных» (нарушает приём 6 — универсальность, и закон вытеснения человека).","practice":"Найти в своей системе 3 антипаттерна и сформулировать каждый как нарушение закона/приёма.","journal":"Список «3 антипаттерна → нарушение чего»."},{"n":3,"title":"Кейс 1 — закрытие периода (точность vs скорость)","goal":"Разобрать самое классическое противоречие в учётных системах.","materials":["Журнал, документация вашей системы."],"cheatsheet":"Классическое ТП: «если закрываем период с полным пересчётом всех агрегатов, то точность ↑, но время ↑»; «если делаем инкрементально, то время ↓, но точность ↓ (накапливается ошибка)». Сильные приёмы для решения: 1 (дробление — закрытие по сегментам), 5 (объединение — батч агрегатов с автообновлением), 10 (предв. действие — материализованные представления), 19 (периодичность — закрытие подзадач в slack-окнах), 23 (обратная связь — сверки и автокоррекция). Способ разделения: во времени (инкрементально + контрольная сверка раз в N) или в структуре (горячий период + холодный архив).","practice":"Применить алгоритм АРИЗ (укороченный) к этому кейсу или к ближайшему аналогу из вашей системы.","journal":"Раздел «Кейсы IT» — кейс 1 с решением."},{"n":4,"title":"Кейс 2 — тяжёлый OLAP-отчёт (оперативность vs полнота)","goal":"Разобрать второй типовой конфликт.","materials":["Журнал."],"cheatsheet":"ТП: «если строим отчёт в реальном времени по полному набору данных, оперативность ↑, но нагрузка/сложность ↑»; «если ограничиваем выборку, нагрузка ↓, но полнота ↓». Сильные приёмы: 1 (дробление — отчёт строится из подотчётов), 15 (динамичность — детализация по требованию), 17 (другое измерение — OLAP-куб), 16 (приближённость — sampling, HyperLogLog для уникальных), 19 (периодичность — pre-агрегаты обновляются ночью). Способ разделения: в структуре (горячая часть в реальном времени, холодная — из агрегатов).","practice":"Прогнать по той же схеме, что в дне 3.","journal":"Кейс 2 в журнале."},{"n":5,"title":"Кейс 3 — миграция данных (целостность vs время простоя)","goal":"Разобрать кейс, который рано или поздно встаёт перед каждой системой.","materials":["Журнал, паттерны миграций (zero-downtime)."],"cheatsheet":"ТП: «если делаем миграцию атомарно с блокировкой, целостность ↑, но простой ↑»; «если онлайн, простой ↓, но риск рассинхрона ↑». Сильные приёмы: 9 (предв. антидействие — двойная запись), 10 (предв. действие — заранее построенная новая структура), 11 (подушка — план отката в любой момент), 23 (обратная связь — сверки), 24 (посредник — слой совместимости), 1 (дробление — миграция по кускам). Способ разделения: во времени (поэтапно) + в структуре (читать из старой и новой одновременно с проверкой).","practice":"Применить к одной из ваших миграций (прошлой или предстоящей).","journal":"Кейс 3 в журнале."},{"n":6,"title":"Кейс 4 — двойной/тройной учёт (бух + налоговый + МСФО)","goal":"Разобрать классическую боль интегрированных учётных систем.","materials":["Журнал, нормативные документы."],"cheatsheet":"ТП: «если ведём один общий учёт с правилами всех видов, целостность ↑, но сложность ↑»; «если параллельно три отдельных учёта, простота ↑, но рассогласование ↑». Сильные приёмы: 1 (дробление — единые проводки + представления для разных видов учёта), 5 (объединение — общий план счетов как универсальный), 6 (универсальность), 10 (предв. действие — материализованные представления для каждого вида), 17 (другое измерение — измерение «вид учёта» в проводке), 23 (обратная связь — автосверка между видами). Способ разделения: в структуре (одно ядро + проекции).","practice":"Применить к своей системе.","journal":"Кейс 4 в журнале."},{"n":7,"title":"Выбор задачи для финального проекта","goal":"Сфокусироваться на одной реальной задаче, которая «не решается в лоб» — это будет ваш финальный проект.","materials":["Журнал."],"cheatsheet":"Хорошая задача для финала: (а) реальная боль в текущем проекте; (б) уже была попытка решить «обычным» путём, но застряла на компромиссе; (в) есть свобода предложить нестандартное; (г) измеримый результат: сокращение времени, повышение точности, упрощение, и т.п. Плохая задача: чисто академическая или «слишком большая, чтобы взять».","practice":"Написать 1-страничное ТЗ к финальному проекту: контекст, текущая боль, что хочется получить, ограничения, измеримый результат.","journal":"Раздел «Финальный проект» — ТЗ на 1 страницу."}]},{"n":9,"title":"Финальный проект и интеграция в работу","goal":"Полностью прогнать выбранную задачу через весь цикл ТРИЗ-инструментов и собрать персональный набор приёмов, которым будете пользоваться постоянно.","bigCase":"Финальный проект целиком — реальная задача с осязаемым артефактом (черновое решение, ADR, прототип или презентация для команды).","days":[{"n":1,"title":"Постановка задачи: контекст и противоречия","goal":"Зафиксировать стартовую точку проекта в формате, понятном и вам, и команде.","materials":["ТЗ из дня 7 недели 8 + журнал."],"cheatsheet":"Раздел «Задача» содержит: (1) краткое описание системы и её надсистемы; (2) описание боли в виде АП; (3) почему она не решается «в лоб» (что мешает); (4) что считается успехом (измеримые критерии).","practice":"Написать раздел «Задача» проекта (~1 страница).","journal":"Финальный проект — раздел «Задача»."},{"n":2,"title":"Анализ ресурсов и оперативных зон","goal":"Сформировать ресурсную базу для решения.","materials":["Журнал, заметки недели 6."],"cheatsheet":"Раздел «Ресурсы» содержит: (1) ОЗ и ОВ; (2) полный список ВПР по 5 категориям × минимум 5 пунктов; (3) скрытые/«вредные» ресурсы; (4) предположение, какие из них особенно полезны.","practice":"Написать раздел «Ресурсы» (~1 страница).","journal":"Финальный проект — раздел «Ресурсы»."},{"n":3,"title":"Формулировка ИКР, ТП и ФП","goal":"Получить чёткую модель противоречия — ядро решения.","materials":["Журнал, заметки недель 2 и 7."],"cheatsheet":"Раздел «Противоречия и ИКР» содержит: (1) АП → ТП-прямое + ТП-обратное; (2) выделение конфликтующей пары; (3) ИКР-1 и ИКР-2; (4) ФП в формате «X в ОЗ во время ОВ должен быть и А, и не-А»; (5) гипотеза о способе разделения (4 классических способа).","practice":"Написать раздел «Противоречия и ИКР».","journal":"Финальный проект — соответствующий раздел."},{"n":4,"title":"Применение приёмов 1–40 + матрицы Альтшуллера","goal":"Сгенерировать минимум 5 идей решения.","materials":["Журнал, заметки недель 3–4."],"cheatsheet":"Алгоритм: (1) определить параметры ТП по матрице (улучшающийся / ухудшающийся); (2) получить рекомендованные приёмы; (3) добавить 2–3 любимых приёма из 1–40; (4) для каждого приёма сгенерировать идею; (5) оценить идеи по идеальности (польза/затраты+вред); (6) выбрать 2–3 для дальнейшей проработки.","practice":"Написать раздел «Идеи решений» — минимум 5 идей с краткой оценкой.","journal":"Финальный проект — раздел «Идеи»."},{"n":5,"title":"Прогноз по ЗРТС: куда система должна развиваться","goal":"Связать конкретное решение с долгосрочным движением системы.","materials":["Журнал, заметки недели 5."],"cheatsheet":"Раздел «Прогноз» содержит: (1) на какой стадии S-кривой ваша система; (2) какие части системы самые слабые сейчас; (3) куда выгодно двигаться (надсистема, идеальность, согласование ритмики); (4) как ваше решение вписывается в это направление; (5) что естественно случится через 1 и 3 года, если решение принято.","practice":"Написать раздел «Прогноз и стратегия».","journal":"Финальный проект — раздел «Прогноз»."},{"n":6,"title":"Документирование решения: ADR / RFC / презентация","goal":"Получить артефакт, готовый к показу команде или руководителю.","materials":["Шаблон ADR (Architecture Decision Record), RFC или ваш стандарт документации."],"cheatsheet":"ADR-шаблон: контекст → решение → последствия (положительные и отрицательные) → альтернативы (которые вы рассмотрели и отклонили — с указанием ТП, по которому отклонили). RFC-шаблон шире: проблема → варианты → выбранный вариант → план внедрения → риски и план отката (приём 11 «подушка»).","practice":"Оформить решение в выбранном формате (ADR / RFC / презентация на 5–10 слайдов).","journal":"Финальный проект — готовый артефакт."},{"n":7,"title":"Ретроспектива курса и личный карман инструментов","goal":"Зафиксировать, что именно из ТРИЗ переходит в вашу постоянную практику.","materials":["Весь журнал."],"cheatsheet":"Структура «личного кармана»: (1) 5–7 любимых приёмов с IT-аналогами и примерами; (2) 1-страничный шаблон карточки задачи (АП → ТП → ФП → ИКР → ВПР → способ разделения → решение); (3) короткий чек-лист «когда применять полный АРИЗ» (3–4 признака сложной задачи); (4) ссылки на 3–5 главных источников; (5) расписание повторения (раз в спринт — 1 задача, раз в квартал — ЗРТС-прогноз, раз в полгода — полное повторение приёмов).","practice":"Написать «личный карман» на 1–2 страницы. Распечатать или закрепить в журнале.","journal":"Финал курса — личный карман инструментов + план повторения."}]}];
const TOTAL_DAYS = COURSE.reduce((s,w)=>s+w.days.length,0);

const STORAGE_KEY = "triz-course-state-v1";
const state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      return {
        current: s.current || {week:1, day:1},
        completed: s.completed || {},
        notes: s.notes || {},
        collapsed: s.collapsed || {},
      };
    }
  }catch(e){}
  return {current:{week:1, day:1}, completed:{}, notes:{}, collapsed:{}};
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function key(w, d){ return w + "-" + d; }

function findFirstUncompleted(){
  for(const w of COURSE){
    for(const d of w.days){
      if(!state.completed[key(w.n, d.n)]) return {week:w.n, day:d.n};
    }
  }
  // all done — go to last day
  const lastW = COURSE[COURSE.length-1];
  const lastD = lastW.days[lastW.days.length-1];
  return {week: lastW.n, day: lastD.n};
}

function getDay(w, d){
  const week = COURSE.find(x=>x.n===w);
  if(!week) return null;
  const day = week.days.find(x=>x.n===d);
  return day ? {week, day} : null;
}

function getNextDay(w, d){
  const week = COURSE.find(x=>x.n===w);
  if(!week) return null;
  const idx = week.days.findIndex(x=>x.n===d);
  if(idx < week.days.length-1){ return {week:w, day:week.days[idx+1].n}; }
  // next week
  const wIdx = COURSE.findIndex(x=>x.n===w);
  if(wIdx < COURSE.length-1){
    const nextW = COURSE[wIdx+1];
    return {week:nextW.n, day:nextW.days[0].n};
  }
  return null;
}

function getPrevDay(w, d){
  const week = COURSE.find(x=>x.n===w);
  if(!week) return null;
  const idx = week.days.findIndex(x=>x.n===d);
  if(idx > 0){ return {week:w, day:week.days[idx-1].n}; }
  const wIdx = COURSE.findIndex(x=>x.n===w);
  if(wIdx > 0){
    const prevW = COURSE[wIdx-1];
    return {week:prevW.n, day:prevW.days[prevW.days.length-1].n};
  }
  return null;
}

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="class") e.className=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if(v===true) e.setAttribute(k,"");
    else if(v!==false && v!=null) e.setAttribute(k, v);
  }
  for(const c of children){
    if(c==null) continue;
    if(typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function renderSidebar(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  for(const w of COURSE){
    const doneCount = w.days.filter(d=>state.completed[key(w.n, d.n)]).length;
    const isCollapsed = !!state.collapsed["w"+w.n];
    const wDiv = el("div", {class: "week" + (isCollapsed?" collapsed":"")});
    const wH = el("div", {class:"week-h", onclick:()=>toggleWeek(w.n)},
      el("span", {}, "Неделя " + w.n + ". " + w.title),
      el("span", {class:"chev"}, "▾")
    );
    // meta with done count
    const meta = el("div", {class:"meta"}, doneCount + "/" + w.days.length);
    wH.insertBefore(meta, wH.lastChild);
    wDiv.appendChild(wH);
    const dList = el("div", {class:"days"});
    for(const d of w.days){
      const k = key(w.n, d.n);
      const isActive = state.current.week===w.n && state.current.day===d.n;
      const isDone = !!state.completed[k];
      const dDiv = el("div", {
        class:"day" + (isActive?" active":"") + (isDone?" done":""),
        onclick:()=>goTo(w.n, d.n),
      },
        el("div", {class:"num"}, String(d.n)),
        el("div", {class:"ttl"}, d.title),
      );
      dList.appendChild(dDiv);
    }
    wDiv.appendChild(dList);
    nav.appendChild(wDiv);
  }
  // progress
  const done = Object.keys(state.completed).filter(k=>state.completed[k]).length;
  const pct = Math.round(100 * done / TOTAL_DAYS);
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("progText").textContent = done + " / " + TOTAL_DAYS + " дней";
  document.getElementById("progPct").textContent = pct + "%";
  document.getElementById("topPct").textContent = pct + "%";
}

function toggleWeek(n){
  state.collapsed["w"+n] = !state.collapsed["w"+n];
  saveState();
  renderSidebar();
}

function renderContent(){
  const content = document.getElementById("content");
  const got = getDay(state.current.week, state.current.day);
  if(!got){
    content.innerHTML = '<p>День не найден.</p>';
    return;
  }
  const {week, day} = got;
  const k = key(week.n, day.n);
  const note = state.notes[k] || "";
  const isDone = !!state.completed[k];

  document.getElementById("topTitle").textContent = "Н" + week.n + " · Д" + day.n + ". " + day.title;

  content.innerHTML = "";
  content.appendChild(el("div", {class:"crumbs"},
    el("span", {class:"week-name"}, "Неделя " + week.n + ". " + week.title),
    " · День " + day.n + " из " + week.days.length
  ));
  content.appendChild(el("h1", {class:"day-title"}, day.title));

  const goal = el("div", {class:"goal"});
  goal.appendChild(el("b", {}, "Цель дня. "));
  goal.appendChild(document.createTextNode(day.goal));
  content.appendChild(goal);

  // Materials
  const matSec = el("section", {class:"block"});
  matSec.appendChild(el("h2", {}, el("span",{class:"ico"},"📚"), "Материалы (~15–20 мин)"));
  const ul = el("ul", {class:"materials"});
  day.materials.forEach(m => ul.appendChild(el("li", {}, m)));
  matSec.appendChild(ul);
  content.appendChild(matSec);

  // Cheatsheet
  const cs = el("section", {class:"block"});
  cs.appendChild(el("h2", {}, el("span",{class:"ico"},"💡"), "Опорный конспект"));
  cs.appendChild(el("div", {class:"cheatsheet"}, day.cheatsheet));
  content.appendChild(cs);

  // Practice
  const pr = el("section", {class:"block"});
  pr.appendChild(el("h2", {}, el("span",{class:"ico"},"🛠"), "Практика (~10–15 мин)"));
  pr.appendChild(el("div", {class:"practice"}, day.practice));
  content.appendChild(pr);

  // Journal template
  const jr = el("section", {class:"block"});
  jr.appendChild(el("h2", {}, el("span",{class:"ico"},"📓"), "Что зафиксировать"));
  jr.appendChild(el("div", {class:"journal"}, day.journal));
  content.appendChild(jr);

  // Notes
  const nb = el("div", {class:"notes-block"});
  nb.appendChild(el("h2", {}, "Мои конспекты"));
  nb.appendChild(el("div", {class:"hint"}, "Сохраняется автоматически в этом браузере. Можно выгрузить кнопкой «Экспорт конспектов»."));
  const ta = el("textarea", {class:"notes", placeholder:"Запишите сюда свои мысли, выводы, идеи… Поле сохраняется автоматически."});
  ta.value = note;
  ta.id = "notesArea";
  ta.addEventListener("input", onNotesInput);
  nb.appendChild(ta);
  nb.appendChild(el("div", {class:"saved-status", id:"savedStatus"}));
  content.appendChild(nb);

  // Bottom actions
  renderActions(week.n, day.n, isDone);

  // scroll to top of article
  document.getElementById("content").scrollIntoView({block:"start"});
  window.scrollTo(0, 0);
}

function renderActions(w, d, isDone){
  const bar = document.getElementById("dayActions");
  bar.innerHTML = "";
  const prev = getPrevDay(w, d);
  const next = getNextDay(w, d);
  const prevBtn = el("button", {onclick:()=>{ if(prev) goTo(prev.week, prev.day); }},
    el("span",{class:"label-long"},"← Назад"),
    el("span",{class:"label-short"},"←"),
  );
  if(!prev) prevBtn.disabled = true;
  const nextBtn = el("button", {onclick:()=>{ if(next) goTo(next.week, next.day); }},
    el("span",{class:"label-long"},"Вперёд →"),
    el("span",{class:"label-short"},"→"),
  );
  if(!next) nextBtn.disabled = true;
  const markBtn = el("button", {
    class: isDone ? "done" : "primary",
    onclick: () => toggleComplete(),
  },
    isDone
      ? el("span",{},"✓ ", el("span",{class:"label-long"},"Пройдено · снять отметку"), el("span",{class:"label-short"},"Снять"))
      : el("span",{},
          el("span",{class:"label-long"},"✓ Отметить как пройденный"),
          el("span",{class:"label-short"},"Отметить"))
  );
  bar.appendChild(prevBtn);
  bar.appendChild(el("div",{class:"spacer"}));
  bar.appendChild(markBtn);
  bar.appendChild(el("div",{class:"spacer"}));
  bar.appendChild(nextBtn);
}

let saveTimer=null;
function onNotesInput(e){
  const k = key(state.current.week, state.current.day);
  state.notes[k] = e.target.value;
  document.getElementById("savedStatus").textContent = "сохраняем…";
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    saveState();
    document.getElementById("savedStatus").textContent = "✓ сохранено " + new Date().toLocaleTimeString().slice(0,5);
    setTimeout(()=>{ const s=document.getElementById("savedStatus"); if(s) s.textContent=""; }, 2500);
  }, 400);
}

function goTo(w, d){
  state.current = {week:w, day:d};
  saveState();
  renderSidebar();
  renderContent();
  closeMenu();
}

function goCurrent(){
  const c = findFirstUncompleted();
  goTo(c.week, c.day);
}

function toggleComplete(){
  const k = key(state.current.week, state.current.day);
  if(state.completed[k]){
    delete state.completed[k];
    saveState();
    renderSidebar();
    renderContent();
  } else {
    state.completed[k] = true;
    saveState();
    // jump to next day if exists
    const next = getNextDay(state.current.week, state.current.day);
    if(next){ goTo(next.week, next.day); }
    else {
      renderSidebar();
      renderFinale();
    }
  }
}

function renderFinale(){
  const content = document.getElementById("content");
  content.innerHTML = "";
  const div = el("div", {class:"finale"});
  div.appendChild(el("h1",{},"Поздравляю!"));
  div.appendChild(el("p",{},"Все 63 дня курса пройдены. Самое время прогнать финальный проект из недели 9 ещё раз — на новой задаче."));
  div.appendChild(el("p",{}));
  const back = el("button",{class:"primary", onclick:()=>goTo(9,7)},"К последнему дню");
  back.style.cssText = "padding:10px 18px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:15px; margin-top:10px";
  div.appendChild(back);
  content.appendChild(div);
  document.getElementById("dayActions").innerHTML = "";
}

function exportNotes(){
  let md = "# Мои конспекты по курсу ТРИЗ\n\n";
  md += "_Сгенерировано: " + new Date().toISOString().slice(0,16).replace("T"," ") + "_\n\n";
  const done = Object.keys(state.completed).filter(k=>state.completed[k]).length;
  md += "Прогресс: **" + done + " / " + TOTAL_DAYS + "** дней (" + Math.round(100*done/TOTAL_DAYS) + "%).\n\n---\n\n";
  for(const w of COURSE){
    md += "## Неделя " + w.n + ". " + w.title + "\n\n";
    md += "_Цель недели:_ " + w.goal + "\n\n";
    for(const d of w.days){
      const k = key(w.n, d.n);
      const note = (state.notes[k] || "").trim();
      const mark = state.completed[k] ? " ✓" : "";
      md += "### День " + d.n + ". " + d.title + mark + "\n\n";
      if(note){ md += note + "\n\n"; } else { md += "_(нет конспекта)_\n\n"; }
    }
    md += "\n";
  }
  const blob = new Blob([md], {type:"text/markdown;charset=utf-8"});
  const a = document.createElement("a");
  const url = URL.createObjectURL(blob);
  a.href = url;
  a.download = "triz-notes-" + new Date().toISOString().slice(0,10) + ".md";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
}

function resetProgress(){
  if(!confirm("Сбросить прогресс и удалить все конспекты? Это действие нельзя отменить.")) return;
  if(!confirm("Точно? Все ваши конспекты будут удалены.")) return;
  localStorage.removeItem(STORAGE_KEY);
  Object.assign(state, {current:{week:1,day:1}, completed:{}, notes:{}, collapsed:{}});
  saveState();
  renderSidebar();
  renderContent();
}

function openMenu(){ document.body.classList.add("menu-open"); }
function closeMenu(){ document.body.classList.remove("menu-open"); }

// Keyboard navigation
document.addEventListener("keydown", (e)=>{
  if(e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if(e.key === "ArrowLeft"){ const p=getPrevDay(state.current.week, state.current.day); if(p) goTo(p.week, p.day); }
  if(e.key === "ArrowRight"){ const n=getNextDay(state.current.week, state.current.day); if(n) goTo(n.week, n.day); }
});

// First run: open at first uncompleted day
function init(){
  // ensure current is valid
  const got = getDay(state.current.week, state.current.day);
  if(!got){
    const c = findFirstUncompleted();
    state.current = c;
    saveState();
  }
  // expand current week, collapse others (only if no collapsed-state stored)
  if(Object.keys(state.collapsed).length === 0){
    for(const w of COURSE){
      if(w.n !== state.current.week) state.collapsed["w"+w.n] = true;
    }
    saveState();
  }
  renderSidebar();
  renderContent();
}
init();
</script>
</body>
</html>
